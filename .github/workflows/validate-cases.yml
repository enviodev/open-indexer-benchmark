name: Validate Cases

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ponder-erc20-transfer-events:
    name: "Ponder: ERC20 Transfer Events"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cases/erc20-transfer-events/ponder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cases/erc20-transfer-events/ponder/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  sqd-erc20-transfer-events:
    name: "Sqd: ERC20 Transfer Events"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cases/erc20-transfer-events/sqd
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cases/erc20-transfer-events/sqd/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  subquery-erc20-transfer-events:
    name: "SubQuery: ERC20 Transfer Events"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cases/erc20-transfer-events/subquery
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cases/erc20-transfer-events/subquery/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Codegen
        run: pnpm codegen

      - name: Build
        run: pnpm build

  envio-erc20-transfer-events:
    name: "Envio: ERC20 Transfer Events"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cases/erc20-transfer-events/envio
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cases/erc20-transfer-events/envio/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Codegen
        run: pnpm codegen
        env:
          ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

      - name: Test
        run: pnpm test
        env:
          ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      indexers:
        description: 'Indexers to benchmark (space-separated). Leave empty for all.'
        required: false
        default: ''
        type: string
      duration:
        description: 'Benchmark duration in seconds'
        required: false
        default: '60'
        type: string
  pull_request:
    types: [labeled]

jobs:
  erc20-transfer-events:
    name: "Benchmark: ERC20 Transfer Events"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-benchmarks')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run benchmarks
        run: |
          DURATION="${{ inputs.duration }}"
          DURATION="${DURATION:-60}"
          INDEXERS="${{ inputs.indexers }}"

          if [ -z "$INDEXERS" ]; then
            node cases/erc20-transfer-events/run.ts --duration="$DURATION" 2>&1 | tee /tmp/benchmark-output.txt
          else
            node cases/erc20-transfer-events/run.ts $INDEXERS --duration="$DURATION" 2>&1 | tee /tmp/benchmark-output.txt
          fi
        env:
          ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

      - name: Post results to job summary
        if: always()
        run: |
          echo "## ERC20 Transfer Events Benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Extract the markdown table if present
          if grep -q "=== Markdown ===" /tmp/benchmark-output.txt 2>/dev/null; then
            sed -n '/=== Markdown ===/,$ p' /tmp/benchmark-output.txt | tail -n +3 >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "<details><summary>Full output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/benchmark-output.txt 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "No output captured" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('/tmp/benchmark-output.txt', 'utf8');
            } catch {
              output = 'No benchmark output captured.';
            }

            let table = '';
            const marker = '=== Markdown ===';
            const idx = output.indexOf(marker);
            if (idx !== -1) {
              table = output.substring(idx + marker.length).trim();
            }

            const body = [
              '## Benchmark Results: ERC20 Transfer Events',
              '',
              table || '_No results table generated._',
              '',
              '<details><summary>Full output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

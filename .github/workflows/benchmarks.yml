name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      indexers:
        description: 'Indexers to benchmark (space-separated). Leave empty for all.'
        required: false
        default: ''
        type: string
      duration:
        description: 'Benchmark duration in seconds'
        required: false
        default: '60'
        type: string
  push:
    branches: [main]
  pull_request:

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      duration: ${{ steps.set-matrix.outputs.duration }}
    steps:
      - id: set-matrix
        run: |
          INDEXERS="${{ inputs.indexers }}"
          if [ -z "$INDEXERS" ]; then
            echo 'matrix=["envio","envio-rpc","ponder","rindexer","subquery","sqd"]' >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(echo "$INDEXERS" | tr ' ' '\n' | jq -R . | jq -sc .)
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi
          DURATION="${{ inputs.duration }}"
          echo "duration=${DURATION:-60}" >> "$GITHUB_OUTPUT"

  benchmark:
    name: "Benchmark: ${{ matrix.indexer }}"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        indexer: ${{ fromJSON(needs.setup.outputs.matrix) }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare services
        run: |
          INDEXER="${{ matrix.indexer }}"
          CASE_DIR="cases/erc20-transfer-events"

          # Pre-pull Docker images so pulls don't count toward benchmark time
          case "$INDEXER" in
            ponder)
              docker pull postgres:17-alpine
              ;;
            rindexer)
              docker compose -f "$CASE_DIR/rindexer/docker-compose.yml" pull
              curl -L https://rindexer.xyz/install.sh | bash
              ;;
            subquery)
              docker compose -f "$CASE_DIR/subquery/docker-compose.yml" pull
              docker compose -f "$CASE_DIR/subquery/docker-compose.yml" build
              ;;
            sqd)
              docker compose -f "$CASE_DIR/sqd/docker-compose.yml" pull
              ;;
          esac

      - name: Run benchmark
        run: |
          set -o pipefail
          node cases/erc20-transfer-events/run.ts ${{ matrix.indexer }} --duration="${{ needs.setup.outputs.duration }}" 2>&1 | tee /tmp/benchmark-output.txt
        env:
          ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

      - name: Post results to job summary
        if: always()
        run: |
          echo "## ${{ matrix.indexer }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/benchmark-output.txt 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "No output captured" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.indexer }}
          path: /tmp/benchmark-output.txt
          if-no-files-found: ignore

  summary:
    name: Summary
    needs: [setup, benchmark]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: benchmark-*

      - name: Build comparison table
        id: build-table
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const duration = parseInt('${{ needs.setup.outputs.duration }}', 10) || 60;

            const resultsDir = 'results';
            const results = [];
            const outputs = [];

            if (fs.existsSync(resultsDir)) {
              for (const dir of fs.readdirSync(resultsDir).sort()) {
                const file = path.join(resultsDir, dir, 'benchmark-output.txt');
                if (!fs.existsSync(file)) continue;
                const content = fs.readFileSync(file, 'utf8');
                outputs.push(content);

                const match = content.match(/Summary — (.+?): ([\d,]+) blocks, ([\d,]+) events/);
                if (match) {
                  const name = match[1];
                  const blocks = parseInt(match[2].replace(/,/g, ''), 10);
                  const events = parseInt(match[3].replace(/,/g, ''), 10);
                  results.push({ name, blocks, events,
                    blocksPerSec: blocks / duration,
                    eventsPerSec: events / duration });
                }
              }
            }

            if (results.length === 0) {
              core.summary.addRaw('## ERC20 Transfer Events Benchmark\n\n_No results collected._\n');
              await core.summary.write();
              return;
            }

            results.sort((a, b) => b.blocksPerSec - a.blocksPerSec);
            const firstRate = results[0].blocksPerSec;
            const fmt = n => n.toLocaleString('en-US', { maximumFractionDigits: 0 });
            const label = (r, i) => {
              if (i === 0 || results.length === 1) return r.name;
              const ratio = firstRate / r.blocksPerSec;
              const n = ratio % 1 === 0 ? String(Math.round(ratio)) : ratio.toFixed(1);
              return `${r.name} (${n}x slower)`;
            };

            const header = `| | ${results.map((r, i) => label(r, i)).join(' | ')} |`;
            const sep = `| --- | ${results.map(() => '---').join(' | ')} |`;
            const blocksRow = `| blocks | ${results.map(r => `${fmt(r.blocks)} (${r.blocksPerSec.toFixed(1)}/s)`).join(' | ')} |`;
            const eventsRow = `| events | ${results.map(r => `${fmt(r.events)} (${r.eventsPerSec.toFixed(1)}/s)`).join(' | ')} |`;
            const table = [header, sep, blocksRow, eventsRow].join('\n');

            core.summary.addRaw(`## ERC20 Transfer Events Benchmark\n\n${table}\n`);
            await core.summary.write();

            fs.writeFileSync('/tmp/benchmark-table.md', table);

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const duration = parseInt('${{ needs.setup.outputs.duration }}', 10) || 60;

            const resultsDir = 'results';
            const results = [];
            const outputs = [];

            if (fs.existsSync(resultsDir)) {
              for (const dir of fs.readdirSync(resultsDir).sort()) {
                const file = path.join(resultsDir, dir, 'benchmark-output.txt');
                if (!fs.existsSync(file)) continue;
                const content = fs.readFileSync(file, 'utf8');
                outputs.push(content);

                const match = content.match(/Summary — (.+?): ([\d,]+) blocks, ([\d,]+) events/);
                if (match) {
                  const name = match[1];
                  const blocks = parseInt(match[2].replace(/,/g, ''), 10);
                  const events = parseInt(match[3].replace(/,/g, ''), 10);
                  results.push({ name, blocks, events,
                    blocksPerSec: blocks / duration,
                    eventsPerSec: events / duration });
                }
              }
            }

            let table = '_No results collected._';
            if (results.length > 0) {
              results.sort((a, b) => b.blocksPerSec - a.blocksPerSec);
              const firstRate = results[0].blocksPerSec;
              const fmt = n => n.toLocaleString('en-US', { maximumFractionDigits: 0 });
              const label = (r, i) => {
                if (i === 0 || results.length === 1) return r.name;
                const ratio = firstRate / r.blocksPerSec;
                const n = ratio % 1 === 0 ? String(Math.round(ratio)) : ratio.toFixed(1);
                return `${r.name} (${n}x slower)`;
              };
              const header = `| | ${results.map((r, i) => label(r, i)).join(' | ')} |`;
              const sep = `| --- | ${results.map(() => '---').join(' | ')} |`;
              const blocksRow = `| blocks | ${results.map(r => `${fmt(r.blocks)} (${r.blocksPerSec.toFixed(1)}/s)`).join(' | ')} |`;
              const eventsRow = `| events | ${results.map(r => `${fmt(r.events)} (${r.eventsPerSec.toFixed(1)}/s)`).join(' | ')} |`;
              table = [header, sep, blocksRow, eventsRow].join('\n');
            }

            const fullOutput = outputs.join('\n\n---\n\n') || 'No benchmark output captured.';

            const body = [
              '## Benchmark Results: ERC20 Transfer Events',
              '',
              table,
              '',
              '<details><summary>Full output</summary>',
              '',
              '```',
              fullOutput,
              '```',
              '',
              '</details>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Update README
        if: github.event_name == 'push'
        run: |
          [ -f /tmp/benchmark-table.md ] || exit 0

          # Replace content between markers with the new table
          awk '
            /<!-- BENCHMARK:erc20-transfer-events:START -->/ { print; while ((getline line < "/tmp/benchmark-table.md") > 0) print line; skip=1; next }
            /<!-- BENCHMARK:erc20-transfer-events:END -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update benchmark results in README"
          git push
